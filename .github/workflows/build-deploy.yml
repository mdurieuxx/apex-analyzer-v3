name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "proxy/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect:
    runs-on: arc-runner-set
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      proxy: ${{ steps.changes.outputs.proxy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changed components
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "proxy=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            echo "$CHANGED"
            echo "backend=$(echo "$CHANGED" | grep -q '^backend/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "frontend=$(echo "$CHANGED" | grep -q '^frontend/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "proxy=$(echo "$CHANGED" | grep -q '^proxy/' && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

  build-backend:
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker pull registry.k3s/build-backend:latest || true
          DOCKER_BUILDKIT=1 docker build \
            --platform linux/amd64 \
            --cache-from registry.k3s/build-backend:latest \
            -t registry.k3s/apex-analyzer-backend:latest \
            ./backend
          docker push registry.k3s/apex-analyzer-backend:latest

  build-frontend:
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker pull registry.k3s/build-frontend:latest || true
          DOCKER_BUILDKIT=1 docker build \
            --platform linux/amd64 \
            --cache-from registry.k3s/build-frontend:latest \
            -t registry.k3s/apex-analyzer-frontend:latest \
            ./frontend
          docker push registry.k3s/apex-analyzer-frontend:latest

  build-proxy:
    needs: detect
    if: needs.detect.outputs.proxy == 'true'
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker pull registry.k3s/build-proxy:latest || true
          DOCKER_BUILDKIT=1 docker build \
            --platform linux/amd64 \
            --cache-from registry.k3s/build-proxy:latest \
            -t registry.k3s/apex-proxy:latest \
            ./proxy
          docker push registry.k3s/apex-proxy:latest

  deploy:
    needs: [detect, build-backend, build-frontend, build-proxy]
    if: always() && !failure() && !cancelled()
    runs-on: arc-runner-set
    steps:
      - name: Rollout restart backend
        if: needs.detect.outputs.backend == 'true'
        run: |
          kubectl rollout restart deployment/backend -n karting-live
          kubectl rollout status deployment/backend -n karting-live --timeout=120s

      - name: Rollout restart frontend
        if: needs.detect.outputs.frontend == 'true'
        run: |
          kubectl rollout restart deployment/frontend -n karting-live
          kubectl rollout status deployment/frontend -n karting-live --timeout=120s

      - name: Rollout restart proxy
        if: needs.detect.outputs.proxy == 'true'
        run: |
          kubectl rollout restart deployment/proxy -n karting-live
          kubectl rollout status deployment/proxy -n karting-live --timeout=120s
