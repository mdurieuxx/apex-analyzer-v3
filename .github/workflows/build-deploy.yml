name: Build & Deploy

on:
  push:
    branches: [main, claude/setup-karting-live-LQHoC]
    paths:
      - "backend/**"
      - "frontend/**"
      - "k8s/**"
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: arc-runner-set
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend
        run: |
          docker build \
            --platform linux/amd64 \
            -t registry.k3s:80/apex-analyzer-backend:latest \
            ./backend

      - name: Build frontend
        run: |
          docker build \
            --platform linux/amd64 \
            -t registry.k3s:80/apex-analyzer-frontend:latest \
            ./frontend

      - name: Push images
        run: |
          docker push registry.k3s:80/apex-analyzer-backend:latest
          docker push registry.k3s:80/apex-analyzer-frontend:latest

      - name: Rollout restart
        run: |
          kubectl rollout restart deployment/backend -n karting-live
          kubectl rollout restart deployment/frontend -n karting-live
          kubectl rollout status deployment/backend -n karting-live --timeout=120s
          kubectl rollout status deployment/frontend -n karting-live --timeout=120s
