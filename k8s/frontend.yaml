apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: karting-live
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: registry.k3s:80/apex-analyzer-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: karting-live
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
