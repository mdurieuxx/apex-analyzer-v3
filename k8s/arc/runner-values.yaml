githubConfigUrl: "https://github.com/mdurieuxx/apex-analyzer-v3"
githubConfigSecret:
  github_token: ""  # set via: helm upgrade --set githubConfigSecret.github_token=<token>

minRunners: 0
maxRunners: 3

containerMode:
  type: "dind"

template:
  spec:
    # registry.k3s doit résoudre depuis les conteneurs DinD internes
    dnsConfig:
      nameservers:
        - 10.43.0.10   # CoreDNS ClusterIP (kube-dns)
    containers:
      - name: dind
        env:
          - name: DOCKER_TLS_CERTDIR
            value: ""
          - name: DOCKER_OPTS
            value: "--insecure-registry=registry.k3s"
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        env:
          - name: DOCKER_HOST
            value: "tcp://localhost:2376"
          - name: DOCKER_TLS_VERIFY
            value: ""
