githubConfigUrl: "https://github.com/mdurieuxx/apex-analyzer-v3"
githubConfigSecret:
  github_token: ""  # set via: helm upgrade --set githubConfigSecret.github_token=<token>

minRunners: 0
maxRunners: 3

# containerMode doit rester vide quand on personnalise le template manuellement
# (cf. ARC docs: "If any customization is required for dind mode, containerMode should remain empty")

template:
  spec:
    dnsConfig:
      nameservers:
        - 10.43.0.10   # CoreDNS ClusterIP — résout les services cluster depuis les pods
    # registry.k3s pointe vers le ClusterIP direct (pas Traefik) pour éviter le HTTPS par défaut
    hostAliases:
      - ip: "10.43.156.151"
        hostnames:
          - "registry.k3s"
    initContainers:
      - name: init-dind-externals
        image: ghcr.io/actions/actions-runner:latest
        command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir
      - name: dind
        image: docker:dind
        restartPolicy: Always
        securityContext:
          privileged: true
        args:
          - dockerd
          - --host=unix:///var/run/docker.sock
          - --group=123
          - --insecure-registry=registry.k3s
        startupProbe:
          exec:
            command: [docker, info]
          failureThreshold: 24
          periodSeconds: 5
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
            value: "120"
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
    volumes:
      - name: work
        emptyDir: {}
      - name: dind-sock
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
