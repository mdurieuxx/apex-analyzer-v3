apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runner-deploy
  namespace: karting-live
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-deploy
  namespace: karting-live
subjects:
  - kind: ServiceAccount
    name: arc-runner-set-gha-rs-no-permission
    namespace: arc-runners
roleRef:
  kind: Role
  name: runner-deploy
  apiGroup: rbac.authorization.k8s.io
