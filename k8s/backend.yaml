apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: karting-live
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeName: durdur-nuc-1
      containers:
        - name: backend
          image: registry.k3s:5000/apex-analyzer-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DB_PATH
              value: /data/karting.db
            - name: PROXY_WS_URL
              value: wss://apex-proxy.durdur.eu/ws
            - name: PROXY_HTTP_URL
              value: https://apex-proxy.durdur.eu
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/status
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          hostPath:
            path: /var/lib/karting-live/data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: karting-live
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
