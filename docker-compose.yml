services:
  backend:
    build: ./backend
    container_name: karting-live-api
    environment:
      - DB_PATH=/data/karting.db
# Proxy Synology NAS
      - PROXY_WS_URL=wss://apex-proxy.durdur.eu/ws
      - PROXY_HTTP_URL=https://apex-proxy.durdur.eu
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - karting_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: karting-live-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  karting_data:
